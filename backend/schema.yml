components:
  schemas:
    ActionEnum:
      enum:
      - View
      - Download
      - Upload
      - Update
      - Delete
      type: string
      description: |-
        * `View` - View
        * `Download` - Download
        * `Upload` - Upload
        * `Update` - Update
        * `Delete` - Delete
    ApplyLeaveRequestRequest:
      type: object
      properties:
        leave_type:
          type: integer
          description: LeaveType ID
        start_date:
          type: string
          minLength: 1
          description: Start Date (YYYY-MM-DD)
        end_date:
          type: string
          minLength: 1
          description: End Date (YYYY-MM-DD)
        reason:
          type: string
          minLength: 1
      required:
      - end_date
      - leave_type
      - start_date
    ApproveLeaveRequestRequest:
      type: object
      properties:
        request_id:
          type: integer
          description: LeaveRequest ID
      required:
      - request_id
    ArchiveDocumentRequestRequest:
      type: object
      properties:
        document_id:
          type: integer
      required:
      - document_id
    Attendance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        employee:
          type: string
        employee_name:
          type: string
          readOnly: true
        employee_last_name:
          type: string
          readOnly: true
        employee_code:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        clock_in:
          type: string
          format: date-time
          nullable: true
        clock_out:
          type: string
          format: date-time
          nullable: true
        total_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        overtime_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        attendance_status:
          $ref: '#/components/schemas/AttendanceStatusEnum'
        remarks:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - employee
      - employee_code
      - employee_last_name
      - employee_name
      - id
      - overtime_hours
      - total_hours
      - updated_at
