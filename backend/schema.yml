        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance.
        required: true
      tags:
      - attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
