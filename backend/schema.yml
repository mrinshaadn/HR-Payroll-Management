            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    delete:
      operationId: attendance_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance.
        required: true
      tags:
      - attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '204':
          description: No response body
  /api/attendance/clock-in/:
    post:
      operationId: attendance_clock_in_create
      description: Allows an employee to clock in once per day.
      summary: Clock In
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /api/attendance/clock-out/:
    post:
      operationId: attendance_clock_out_create
      description: Clocks out the logged-in employee for the current day and calculates
        working hours.
      summary: Clock Out
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /api/attendance/history/:
    get:
      operationId: attendance_history_list
      description: Retrieves history of attendance. Employees only see their own,
        while HR/Admin can see and filter all.
      summary: Get Attendance History
      parameters:
      - in: query
        name: employee_id
        schema:
          type: string
        description: Filter by Employee ID (HR/Admin only)
      - in: query
        name: end_date
        schema:
          type: string
        description: Filter by end date (YYYY-MM-DD)
      - in: query
        name: start_date
        schema:
          type: string
        description: Filter by start date (YYYY-MM-DD)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by attendance status
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
  /api/attendance/monthly-summary/:
    get:
      operationId: attendance_monthly_summary_retrieve
      description: Calculates and returns attendance summary stats for the selected
        employee and month.
      summary: Get Monthly Attendance Summary
      parameters:
      - in: query
        name: employee_id
        schema:
          type: string
        description: Employee ID
      - in: query
        name: month
        schema:
          type: integer
        description: Month
      - in: query
        name: year
        schema:
          type: integer
        description: Year
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceMonthlySummary'
          description: ''
  /api/attendance/today/:
    get:
      operationId: attendance_today_retrieve
      description: Retrieves the current clock-in/out status for the logged-in employee
        for today.
      summary: Get Today's Attendance Status
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns authenticated user info, role, and permission array for
        frontend auth.
      summary: Get current user details and permissions
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: ''
  /api/auth/permissions/:
    get:
      operationId: auth_permissions_list
      description: Returns array of permissions (strings) assigned to the current
        user's role.
      summary: Get user permission identifiers directly
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      security:
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
