openapi: 3.0.3
info:
  title: HRMS (HR Flow) Backend API
  version: 1.0.0
  description: Comprehensive REST API documentation for the Human Resource Management
    System (HRMS) backend.
paths:
  /api/accounts/profile/:
    get:
      operationId: accounts_profile_retrieve
      summary: Get user profile details
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: ''
  /api/analytics/attendance/:
    get:
      operationId: analytics_attendance_retrieve
      description: Returns daily counts, rates, monthly trends, and department-wise
        attendance averages.
      summary: Get Attendance Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceAnalyticsResponse'
          description: ''
  /api/analytics/charts/:
    get:
      operationId: analytics_charts_retrieve
      description: Returns historical monthly coordinates for growth, payout, and
        candidate charts.
      summary: Get Chart Metrics Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartsAnalyticsResponse'
          description: ''
  /api/analytics/dashboard/:
    get:
      operationId: analytics_dashboard_retrieve
      description: Returns aggregate KPI overview metrics for the landing dashboard.
      summary: Get Dashboard Overview Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardAnalyticsResponse'
          description: ''
  /api/analytics/documents/:
    get:
      operationId: analytics_documents_retrieve
      description: Returns counts of active files by category and completeness rates
        of employee documents.
      summary: Get Document Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentAnalyticsResponse'
          description: ''
  /api/analytics/employees/:
    get:
      operationId: analytics_employees_retrieve
      description: Returns breakdowns of employees by status, department, designation,
        and gender.
      summary: Get Employee Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAnalyticsResponse'
          description: ''
  /api/analytics/leave/:
    get:
      operationId: analytics_leave_retrieve
      description: Returns statistics on leave request statuses, monthly trends, and
        department ratios.
      summary: Get Leave Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveAnalyticsResponse'
          description: ''
  /api/analytics/overview/:
    get:
      operationId: analytics_overview_retrieve
      description: Returns consolidated key performance indicators overview.
      summary: Get Alternative Overview Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewAnalyticsResponse'
          description: ''
  /api/analytics/payroll/:
    get:
      operationId: analytics_payroll_retrieve
      description: Returns payroll costs, average payouts, tax summaries, and department
        distributions.
      summary: Get Payroll Analytics
      tags:
      - Analytics
      security:
      - jwtAuth: []
      - Bearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollAnalyticsResponse'
          description: ''
  /api/analytics/recruitment/:
    get:
      operationId: analytics_recruitment_retrieve
      description: Returns recruitment vacancy counts, candidates, and funnel stages
